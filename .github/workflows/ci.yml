name: CI — Crisis Command Center

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # BACKEND: Python tests via uv
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.14)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --tb=short --no-header -q
        env:
          # Ensure offline mode (no API keys needed for tests)
          GEMINI_API_KEY: ""
          OPENAI_API_KEY: ""

  # ──────────────────────────────────────────────────────────────
  # FRONTEND: Lint, Type Check, Tests, Build
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build (production)
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # DOCKER: Verify both images build successfully
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # Only run if both backend and frontend checks passed
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: crisis-command-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: crisis-command-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images exist
        run: |
          docker images --filter "reference=crisis-command-backend:ci" --format "{{.Repository}}:{{.Tag}}"
          docker images --filter "reference=crisis-command-frontend:ci" --format "{{.Repository}}:{{.Tag}}"
          echo "✅ Both Docker images built successfully"

  # ──────────────────────────────────────────────────────────────
  # STATUS BADGE (summary)
  # ──────────────────────────────────────────────────────────────
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()

    steps:
      - name: Check overall status
        run: |
          echo "Backend:  ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Docker:   ${{ needs.docker.result }}"
          if [ "${{ needs.backend.result }}" = "success" ] && \
             [ "${{ needs.frontend.result }}" = "success" ] && \
             [ "${{ needs.docker.result }}" = "success" ]; then
            echo "✅ All CI checks passed"
          else
            echo "❌ Some CI checks failed"
            exit 1
          fi
