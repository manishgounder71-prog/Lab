<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_4 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_4" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_4');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Create the Severity Orb
const geometry = new THREE.IcosahedronGeometry(1, 4);
const material = new THREE.MeshPhongMaterial({
    color: 0xff0000,
    emissive: 0x330000,
    shininess: 100,
    transparent: true,
    opacity: 0.8,
    wireframe: true
});

const orb = new THREE.Mesh(geometry, material);
scene.add(orb);

// Inner Core
const coreGeom = new THREE.SphereGeometry(0.5, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
const core = new THREE.Mesh(coreGeom, coreMat);
scene.add(core);

const light = new THREE.PointLight(0xff0000, 2, 10);
light.position.set(2, 2, 2);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 3;

function animate() {
    requestAnimationFrame(animate);
    orb.rotation.y += 0.01;
    orb.rotation.x += 0.005;
    
    const scale = 1.0 + Math.sin(Date.now() * 0.005) * 0.1;
    orb.scale.set(scale, scale, scale);
    core.scale.set(1.0 - (scale-1.0), 1.0 - (scale-1.0), 1.0 - (scale-1.0));
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_4 -->
</body>
</html>
